theme = "base16"

[editor]
bufferline = "multiple"
idle-timeout = 50
completion-timeout = 50
gutters = ["diagnostics", "coverage", "line-numbers", "diff"]
#gutters = ["diagnostics", "line-numbers", "coverage", "diff"]
end-of-line-diagnostics = "info"
# [editor.whitespace]
# render = "all"
auto-save.focus-lost = true
[editor.auto-save.after-delay]
enable = true
timeout = 3000
[editor.soft-wrap]
enable = true
[editor.indent-guides]
render = true
[editor.inline-diagnostics]
cursor-line = "hint"
other-lines = "disable"
[editor.statusline]
right = ["diagnostics", "selections", "position", "file-encoding", "file-line-ending", "file-type"]
diagnostics = ["error", "warning", "info", "hint"]


[keys.normal]
C-a = "code_action"
K = "half_page_up"
J = "half_page_down"
"," = ["goto_prev_diag", "code_action"]
tab = "indent"
S-tab = "unindent"

[keys.select]
K = "half_page_up"
J = "half_page_down"

[keys.insert]
C-a = "code_action"
tab = "indent"
S-tab = "unindent"
